services:
  app:
    build: .
    image: my-tools-hub
    container_name: my-tools-hub
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      # Streamlit gathers anonymous usage stats by default; off for privacy.
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Caps so a heavy tool (matplotlib, markitdown, PDF/image work) can't OOM the
    # host. `mem_limit`/`cpus` are honored by `docker compose up`; the `deploy`
    # block covers Swarm/`docker stack`. Tune to your machine.
    mem_limit: 1g
    cpus: 1.5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"
