name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system fonts (PDF/image tools)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile
        run: python -m py_compile main.py translations.py pdfutil.py tablutil.py services/*.py

      - name: Smoke test (headless render of every tool)
        run: python tests/smoke_test.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dependency vulnerability audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -r requirements.txt
          # Report-only: don't fail the build on advisories, but surface them.
          pip-audit || true
